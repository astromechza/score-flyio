                  $ref: '#/components/schemas/MachineVersion'
  /apps/{app_name}/machines/{machine_id}/wait:
    get:
      tags:
        - Machines
      operationId: Machines_wait
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: machine_id
          in: path
          description: Machine ID
          required: true
          schema:
            type: string
        - name: instance_id
          in: query
          description: instance? version? TODO
          schema:
            type: string
        - name: timeout
          in: query
          description: wait timeout. default 60s
          schema:
            type: integer
        - name: state
          in: query
          description: desired state
          schema:
            type: string
            enum:
              - started
              - stopped
              - destroyed
      responses:
        "200":
          description: OK
          content: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
