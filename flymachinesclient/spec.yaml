openapi: 3.0.1
info:
  title: Fly Machines API
  description: ""
  contact: {}
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: "1.0"
externalDocs:
  url: https://fly.io/docs/machines/working-with-machines/
servers:
  - url: https://api.machines.dev/v1
paths:
  /apps:
    get:
      tags:
        - Apps
      operationId: Apps_list
      parameters:
        - name: org_slug
          in: query
          description: "The org slug, or 'personal', to filter apps"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAppsResponse'
    post:
      tags:
        - Apps
      operationId: Apps_create
      requestBody:
        description: App body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppRequest'
        required: true
      responses:
        "201":
          description: Created
          content: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-codegen-request-body-name: request
  /apps/{app_name}:
    get:
      tags:
        - Apps
      operationId: Apps_show
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
    delete:
      tags:
        - Apps
      operationId: Apps_delete
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Accepted
          content: {}
  /apps/{app_name}/machines:
    get:
      tags:
        - Machines
      operationId: Machines_list
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: include_deleted
          in: query
          description: Include deleted machines
          schema:
            type: boolean
        - name: region
          in: query
          description: Region filter
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Machine'
    post:
      tags:
        - Machines
      operationId: Machines_create
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
      requestBody:
        description: Create machine request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMachineRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
      x-codegen-request-body-name: request
  /apps/{app_name}/machines/{machine_id}:
    get:
      tags:
        - Machines
      operationId: Machines_show
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: machine_id
          in: path
          description: Machine ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
    post:
      tags:
        - Machines
      operationId: Machines_update
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: machine_id
          in: path
          description: Machine ID
          required: true
          schema:
            type: string
      requestBody:
