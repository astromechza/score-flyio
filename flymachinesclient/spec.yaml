        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMachineRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-codegen-request-body-name: request
    delete:
      tags:
        - Machines
      operationId: Machines_delete
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: machine_id
          in: path
          description: Machine ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
  /apps/{app_name}/machines/{machine_id}/cordon:
    post:
      tags:
        - Machines
      description: "“Cordoning” a machine refers to disabling its services, so the\
        \ proxy won’t route requests to it. In flyctl this is used by blue/green deployments;\
        \ one set of machines is started up with services disabled, and when they\
        \ are all healthy, the services are enabled on the new machines and disabled\
        \ on the old ones."
      operationId: Machines_cordon
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: machine_id
          in: path
          description: Machine ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
  /apps/{app_name}/machines/{machine_id}/events:
    get:
      tags:
        - Machines
      operationId: Machines_list_events
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: machine_id
