            type: string
        - name: volume_id
          in: path
          description: Volume ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Volume'
    post:
      tags:
        - Volumes
      operationId: Volumes_update
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: volume_id
