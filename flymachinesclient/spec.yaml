        - Machines
      operationId: Machines_release_lease
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: machine_id
          in: path
          description: Machine ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
  /apps/{app_name}/machines/{machine_id}/metadata:
