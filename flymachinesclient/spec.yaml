      operationId: Volumes_get_snapshots
      parameters:
        - name: app_name
          in: path
          description: Fly App Name
          required: true
          schema:
            type: string
        - name: volume_id
          in: path
          description: Volume ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VolumeSnapshot'
components:
  schemas:
    App:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        organization:
          $ref: '#/components/schemas/Organization'
        status:
          type: string
    CheckStatus:
      type: object
      properties:
        name:
          type: string
        output:
          type: string
        status:
          type: string
        updated_at:
          type: string
    CreateAppRequest:
      type: object
      properties:
        app_name:
          type: string
        network:
          type: string
        org_slug:
          type: string
    CreateLeaseRequest:
      type: object
      properties:
        description:
          type: string
        ttl:
          type: integer
    CreateMachineRequest:
      type: object
      properties:
        config:
          type: object
          description: An object defining the Machine configuration
          allOf:
            - $ref: '#/components/schemas/api.MachineConfig'
        lease_ttl:
          type: integer
        lsvd:
          type: boolean
        name:
          type: string
          description: "Unique name for this Machine. If omitted, one is generated\
            \ for you"
        region:
          type: string
          description: The target region. Omitting this param launches in the same
            region as your WireGuard peer connection (somewhere near you).
        skip_launch:
          type: boolean
        skip_service_registration:
          type: boolean
    CreateVolumeRequest:
      type: object
      properties:
        compute:
          $ref: '#/components/schemas/api.MachineGuest'
        encrypted:
          type: boolean
        fstype:
          type: string
        machines_only:
          type: boolean
        name:
          type: string
        region:
          type: string
        require_unique_zone:
          type: boolean
        size_gb:
          type: integer
        snapshot_id:
          type: string
          description: restore from snapshot
        snapshot_retention:
          type: integer
        source_volume_id:
          type: string
          description: fork from remote volume
    ErrorResponse:
      type: object
      properties:
        details:
          type: object
          description: Deprecated
        error:
          type: string
        status:
          $ref: '#/components/schemas/main.statusCode'
    ExtendVolumeRequest:
      type: object
      properties:
        size_gb:
          type: integer
    ExtendVolumeResponse:
      type: object
      properties:
        needs_restart:
          type: boolean
        volume:
          $ref: '#/components/schemas/Volume'
    ImageRef:
      type: object
      properties:
        digest:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        registry:
          type: string
        repository:
          type: string
        tag:
          type: string
    Lease:
      type: object
      properties:
        description:
          type: string
          description: Description or reason for the Lease.
        expires_at:
          type: integer
          description: ExpiresAt is the unix timestamp in UTC to denote when the Lease
            will no longer be valid.
        nonce:
          type: string
          description: Nonce is the unique ID autogenerated and associated with the
            Lease.
        owner:
          type: string
          description: Owner is the user identifier which acquired the Lease.
        version:
          type: string
          description: Machine version
    ListApp:
      type: object
      properties:
        id:
          type: string
        machine_count:
          type: integer
        name:
          type: string
        network:
          type: object
    ListAppsResponse:
      type: object
      properties:
        apps:
          type: array
          items:
            $ref: '#/components/schemas/ListApp'
        total_apps:
          type: integer
    ListenSocket:
      type: object
      properties:
        address:
          type: string
        proto:
          type: string
    Machine:
      type: object
      properties:
        checks:
          type: array
          items:
            $ref: '#/components/schemas/CheckStatus'
        config:
          $ref: '#/components/schemas/api.MachineConfig'
        created_at:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/MachineEvent'
        id:
          type: string
        image_ref:
          $ref: '#/components/schemas/ImageRef'
        instance_id:
          type: string
          description: InstanceID is unique for each version of the machine
        name:
          type: string
        nonce:
          type: string
          description: Nonce is only every returned on machine creation if a lease_duration
            was provided.
        private_ip:
          type: string
          description: PrivateIP is the internal 6PN address of the machine.
        region:
          type: string
        state:
          type: string
        updated_at:
          type: string
    MachineEvent:
      type: object
      properties:
        id:
          type: string
        request:
          type: object
        source:
          type: string
        status:
          type: string
        timestamp:
          type: integer
        type:
          type: string
    MachineExecRequest:
      type: object
      properties:
        cmd:
          type: string
          description: "Deprecated: use Command instead"
        command:
          type: array
          items:
            type: string
        timeout:
          type: integer
    MachineVersion:
      type: object
      properties:
        user_config:
          $ref: '#/components/schemas/api.MachineConfig'
        version:
          type: string
    Organization:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
    ProcessStat:
      type: object
      properties:
        command:
          type: string
        cpu:
          type: integer
        directory:
          type: string
        listen_sockets:
          type: array
          items:
            $ref: '#/components/schemas/ListenSocket'
        pid:
          type: integer
        rss:
          type: integer
        rtime:
          type: integer
        stime:
          type: integer
    SignalRequest:
      type: object
      properties:
        signal:
          type: string
          enum:
            - SIGABRT
            - SIGALRM
            - SIGFPE
            - SIGHUP
            - SIGILL
            - SIGINT
            - SIGKILL
            - SIGPIPE
            - SIGQUIT
            - SIGSEGV
            - SIGTERM
            - SIGTRAP
            - SIGUSR1
    StopRequest:
      type: object
      properties:
        signal:
          type: string
        timeout:
          type: string
    UpdateMachineRequest:
      type: object
      properties:
        config:
          type: object
          description: An object defining the Machine configuration
          allOf:
            - $ref: '#/components/schemas/api.MachineConfig'
        current_version:
          type: string
        lease_ttl:
          type: integer
        lsvd:
          type: boolean
        name:
          type: string
          description: "Unique name for this Machine. If omitted, one is generated\
            \ for you"
        region:
          type: string
          description: The target region. Omitting this param launches in the same
            region as your WireGuard peer connection (somewhere near you).
        skip_launch:
          type: boolean
        skip_service_registration:
          type: boolean
    UpdateVolumeRequest:
      type: object
      properties:
        snapshot_retention:
          type: integer
    Volume:
      type: object
      properties:
        attached_alloc_id:
          type: string
        attached_machine_id:
          type: string
        block_size:
          type: integer
        blocks:
          type: integer
        blocks_avail:
          type: integer
        blocks_free:
          type: integer
        created_at:
          type: string
        encrypted:
          type: boolean
        fstype:
          type: string
        id:
          type: string
        name:
          type: string
        region:
          type: string
        size_gb:
          type: integer
        snapshot_retention:
          type: integer
        state:
          type: string
        zone:
          type: string
    VolumeSnapshot:
      type: object
      properties:
        created_at:
          type: string
        digest:
          type: string
        id:
          type: string
        size:
          type: integer
    api.DNSConfig:
      type: object
      properties:
        skip_registration:
          type: boolean
    api.File:
      type: object
      properties:
        guest_path:
          type: string
          description: |-
            GuestPath is the path on the machine where the file will be written and must be an absolute path.
            i.e. /full/path/to/file.json
        raw_value:
          type: string
          description: RawValue containts the base64 encoded string of the file contents.
        secret_name:
          type: string
          description: SecretName is the name of the secret that contains the base64
            encoded file contents.
    api.HTTPOptions:
      type: object
      properties:
        compress:
          type: boolean
        h2_backend:
          type: boolean
        response:
          $ref: '#/components/schemas/api.HTTPResponseOptions'
    api.HTTPResponseOptions:
      type: object
      properties:
        headers:
          type: object
          additionalProperties:
            type: object
    api.MachineCheck:
      type: object
      properties:
        grace_period:
          type: string
        headers:
          type: array
          items:
            $ref: '#/components/schemas/api.MachineHTTPHeader'
        interval:
          type: string
        method:
          type: string
        path:
          type: string
        port:
          type: integer
        protocol:
          type: string
        timeout:
          type: string
        tls_server_name:
          type: string
        tls_skip_verify:
          type: boolean
        type:
          type: string
    api.MachineConfig:
      type: object
      properties:
        auto_destroy:
          type: boolean
          description: Optional boolean telling the Machine to destroy itself once
            it’s complete (default false)
        checks:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/api.MachineCheck'
        disable_machine_autostart:
          type: boolean
          description: "Deprecated: use Service.Autostart instead"
        dns:
          $ref: '#/components/schemas/api.DNSConfig'
        env:
          type: object
          additionalProperties:
            type: string
          description: An object filled with key/value pairs to be set as environment
            variables
        files:
          type: array
          items:
            $ref: '#/components/schemas/api.File'
        guest:
          $ref: '#/components/schemas/api.MachineGuest'
        image:
          type: string
          description: The docker image to run
        init:
          $ref: '#/components/schemas/api.MachineInit'
        metadata:
          type: object
          additionalProperties:
            type: string
        metrics:
          $ref: '#/components/schemas/api.MachineMetrics'
        mounts:
          type: array
          items:
            $ref: '#/components/schemas/api.MachineMount'
        processes:
          type: array
          items:
            $ref: '#/components/schemas/api.MachineProcess'
        restart:
          $ref: '#/components/schemas/api.MachineRestart'
        schedule:
          type: string
        services:
          type: array
          items:
            $ref: '#/components/schemas/api.MachineService'
        size:
          type: string
          description: "Deprecated: use Guest instead"
        standbys:
          type: array
          description: |-
            Standbys enable a machine to be a standby for another. In the event of a hardware failure,
            the standby machine will be started.
          items:
            type: string
        statics:
          type: array
          items:
            $ref: '#/components/schemas/api.Static'
        stop_config:
          $ref: '#/components/schemas/api.StopConfig'
    api.MachineGuest:
      type: object
      properties:
        cpu_kind:
          type: string
        cpus:
          type: integer
        gpu_kind:
          type: string
        host_dedication_id:
          type: string
        kernel_args:
          type: array
          items:
            type: string
        memory_mb:
          type: integer
    api.MachineHTTPHeader:
      type: object
      properties:
        name:
          type: string
        values:
          type: array
          items:
            type: string
    api.MachineInit:
      type: object
      properties:
        cmd:
          type: array
          items:
            type: string
        entrypoint:
          type: array
          items:
            type: string
        exec:
          type: array
          items:
            type: string
        kernel_args:
          type: array
          items:
            type: string
        swap_size_mb:
          type: integer
        tty:
          type: boolean
    api.MachineMetrics:
      type: object
      properties:
        path:
          type: string
        port:
          type: integer
    api.MachineMount:
      type: object
      properties:
        add_size_gb:
          type: integer
        encrypted:
          type: boolean
        extend_threshold_percent:
          type: integer
        name:
          type: string
        path:
          type: string
        size_gb:
          type: integer
        size_gb_limit:
          type: integer
        volume:
          type: string
    api.MachinePort:
      type: object
      properties:
        end_port:
          type: integer
        force_https:
          type: boolean
        handlers:
          type: array
          items:
            type: string
        http_options:
          $ref: '#/components/schemas/api.HTTPOptions'
        port:
          type: integer
        proxy_proto_options:
          $ref: '#/components/schemas/api.ProxyProtoOptions'
        start_port:
          type: integer
        tls_options:
          $ref: '#/components/schemas/api.TLSOptions'
    api.MachineProcess:
      type: object
      properties:
        cmd:
          type: array
          items:
            type: string
        entrypoint:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        exec:
          type: array
          items:
            type: string
        user:
          type: string
    api.MachineRestart:
      type: object
      properties:
        max_retries:
          type: integer
          description: MaxRetries is only relevant with the on-failure policy.
        policy:
          type: string
    api.MachineService:
      type: object
      properties:
        autostart:
          type: boolean
        autostop:
          type: boolean
        checks:
          type: array
          items:
            $ref: '#/components/schemas/api.MachineCheck'
        concurrency:
          $ref: '#/components/schemas/api.MachineServiceConcurrency'
        force_instance_description:
          type: string
        force_instance_key:
          type: string
        internal_port:
          type: integer
        min_machines_running:
          type: integer
        ports:
          type: array
          items:
            $ref: '#/components/schemas/api.MachinePort'
        protocol:
          type: string
    api.MachineServiceConcurrency:
      type: object
      properties:
        hard_limit:
          type: integer
        soft_limit:
          type: integer
        type:
          type: string
    api.ProxyProtoOptions:
      type: object
      properties:
        version:
          type: string
    api.Static:
      required:
        - guest_path
        - url_prefix
      type: object
      properties:
        guest_path:
          type: string
        url_prefix:
          type: string
    api.StopConfig:
      type: object
      properties:
        signal:
          type: string
        timeout:
          type: string
    api.TLSOptions:
      type: object
      properties:
        alpn:
          type: array
          items:
            type: string
        default_self_signed:
          type: boolean
        versions:
          type: array
          items:
            type: string
    main.statusCode:
      type: string
      enum:
        - unknown
        - insufficient_capacity
      x-enum-varnames:
        - unknown
        - capacityErr
