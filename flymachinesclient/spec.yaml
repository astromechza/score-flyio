      requestBody:
        description: Request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtendVolumeRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtendVolumeResponse'
      x-codegen-request-body-name: request
  /apps/{app_name}/volumes/{volume_id}/snapshots:
