apiVersion: score.dev/v1b1

metadata:
  name: hello-world

containers:
  web:
    image: nginx
    livenessProbe:
      httpGet:
        path: "/"
        port: 80
    readinessProbe:
      httpGet:
        path: "/"
        port: 80

service:
  ports:
    www:
      protocol: tcp
      port: 80
      targetPort: 80
