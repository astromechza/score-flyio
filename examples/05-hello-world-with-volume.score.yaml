apiVersion: score.dev/v1b1

metadata:
  name: hello-world

containers:
  hello:
    image: busybox
    command: ["/bin/sh", "-c", "while true; do echo Hello ${NAME}!; sleep 5; done"]
    volumes:
      - source: ${resources.vol}
        target: /mnt

resources:
  vol:
    metadata:
      annotations:
        score-flyio/volume_name: my-volume
    type: volume
